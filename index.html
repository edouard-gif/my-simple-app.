<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Calendar</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .result { margin-top: 20px; padding: 15px; background-color: #f0f8ff; border-radius: 5px; font-weight: bold; text-align: center;}
        /* Simulating a "booked" time slot visually */
        option:disabled { color: #aaa; background-color: #f9f9f9; font-style: italic; }
    </style>
</head>
<body>

    <h2>Select Your Booking</h2>

    <div class="form-group">
        <label for="date">Select Date:</label>
        <input type="date" id="date" required>
    </div>

    <div class="form-group">
        <label for="startTime">Start Time:</label>
        <select id="startTime" onchange="calculateDuration()"></select>
    </div>

    <div class="form-group">
        <label for="endTime">End Time:</label>
        <select id="endTime" onchange="calculateDuration()"></select>
    </div>

    <div id="resultBox" class="result" style="display:none;">
        Total Duration: <span id="totalHours">0</span> hours
    </div>

    <script>
        // Generate time slots from 07:00 to 23:30
        function generateTimeSlots() {
            const startSelect = document.getElementById('startTime');
            const endSelect = document.getElementById('endTime');
            let times = [];

            for (let h = 7; h <= 23; h++) {
                for (let m = 0; m < 60; m += 30) {
                    if (h === 23 && m === 30) {
                        times.push("23:30"); // Max time
                        break; 
                    }
                    let hour = h < 10 ? "0" + h : h;
                    let minute = m === 0 ? "00" : m;
                    times.push(`${hour}:${minute}`);
                }
            }

            // Populate Dropdowns
            times.forEach(time => {
                let option1 = new Option(time, time);
                let option2 = new Option(time, time);
                
                // Example: Hardcoding a "booked" slot to show you how the visual gray-out works
                if(time === "10:00" || time === "10:30") {
                    option1.disabled = true;
                    option1.text += " (Unavailable)";
                }

                startSelect.add(option1);
                endSelect.add(option2);
            });
        }

        // Calculate the difference between start and end times
        function calculateDuration() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const resultBox = document.getElementById('resultBox');
            const totalHoursSpan = document.getElementById('totalHours');

            if (start && end) {
                // Convert "HH:MM" to decimal hours (e.g., 08:30 -> 8.5)
                const startParts = start.split(':');
                const endParts = end.split(':');
                
                const startDecimal = parseInt(startParts[0]) + (parseInt(startParts[1]) / 60);
                const endDecimal = parseInt(endParts[0]) + (parseInt(endParts[1]) / 60);

                let duration = endDecimal - startDecimal;

                if (duration > 0) {
                    totalHoursSpan.innerText = duration;
                    resultBox.style.display = "block";
                    resultBox.style.color = "black";
                } else {
                    totalHoursSpan.innerText = "Invalid (End time must be after Start time)";
                    resultBox.style.display = "block";
                    resultBox.style.color = "red";
                }
            }
        }

        // Restrict date picker to today and up to 1 year in the future
        function setupDateConstraints() {
            const dateInput = document.getElementById('date');
            const today = new Date();
            const nextYear = new Date();
            nextYear.setFullYear(today.getFullYear() + 1);

            dateInput.min = today.toISOString().split("T")[0];
            dateInput.max = nextYear.toISOString().split("T")[0];
        }

        // Initialize
        generateTimeSlots();
        setupDateConstraints();
    </script>
</body>
</html>
